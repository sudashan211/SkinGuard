[pytest]
# Pytest configuration for SkinGuard tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    unit: Unit tests
    property: Property-based tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    database: Tests requiring database connection

# Hypothesis settings
hypothesis_profile = default

[hypothesis]
# Default profile for property-based tests
max_examples = 100
deadline = None
