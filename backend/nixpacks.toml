# Nixpacks configuration for Railway deployment
# Required for OpenCV (cv2) and image processing libraries

[phases.setup]
aptPkgs = [
    "libgl1-mesa-glx",
    "libglib2.0-0",
    "libsm6",
    "libxext6",
    "libxrender-dev",
    "libgomp1",
    "libgthread-2.0-0",
    "libavcodec-dev",
    "libavformat-dev",
    "libswscale-dev"
]
